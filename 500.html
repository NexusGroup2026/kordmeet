<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Erro Interno | Kord</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #ef4444;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container { max-width: 500px; padding: 20px; }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 48px; margin-bottom: 16px; color: #fff; font-weight: 800; }
        p { color: #94a3b8; font-size: 18px; line-height: 1.6; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background: #6366f1;
            color: #fff;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
        }
        .btn:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        <h1>ERRO INTERNO</h1>
        <p>Algo deu errado. Nossa equipe foi notificada e está trabalhando para resolver o problema.</p>
        <a href="https://kord.gg" class="btn">Tentar Novamente</a>
    </div>
</body>
</html>
