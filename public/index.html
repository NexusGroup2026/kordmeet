<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <title>ZoomCord — Video Chat Seguro</title>
</head>
<body>
  <div class="join-container">
    <header class="join-header">
      <h1><i class="fas fa-shield-halved"></i> ZoomCord</h1>
      <p class="subtitle">Chat e Vídeo com Criptografia Ponta-a-Ponta</p>
    </header>
    <main class="join-main">
      <form action="chat.html">
        <div class="form-control">
          <label for="username"><i class="fas fa-user"></i> Nome</label>
          <input type="text" name="username" id="username" placeholder="Seu nome..." required maxlength="30" autocomplete="off">
        </div>
        <div class="form-control">
          <label for="room"><i class="fas fa-door-open"></i> Sala</label>
          <select name="room" id="room" required>
            <option value="">Escolha uma sala...</option>
            <option value="Sala Brasil">🇧🇷 Sala Brasil</option>
            <option value="Sala Portugal">🇵🇹 Sala Portugal</option>
            <option value="Sala Global">🌍 Sala Global</option>
            <option value="Dev & Tech">💻 Dev & Tech</option>
            <option value="Gaming">🎮 Gaming</option>
          </select>
        </div>
        <div class="form-control">
          <label for="custom-room"><i class="fas fa-plus"></i> Ou crie sua sala</label>
          <input type="text" id="custom-room" placeholder="Nome da nova sala..." maxlength="30" oninput="document.getElementById('room').value=this.value">
        </div>
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-right-to-bracket"></i> Entrar na Sala
        </button>
      </form>
    </main>
    <footer>
      <p><i class="fas fa-lock"></i> Criptografia NaCl — Suas mensagens são só suas</p>
    </footer>
  </div>
</body>
</html>
