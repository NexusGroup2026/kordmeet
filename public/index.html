<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kord</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; }
        .splash {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        .splash.hidden { opacity: 0; pointer-events: none; }
        .splash h1 { color: #6366f1; font-size: 2.5rem; margin-bottom: 1rem; }
        .splash p { color: #64748b; font-size: 0.9rem; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(99,102,241,0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        iframe { width: 100%; height: 100vh; border: none; }
    </style>
</head>
<body>
    <div class="splash" id="splash">
        <div class="spinner"></div>
        <h1>Kord</h1>
        <p>Conectando...</p>
    </div>
    <iframe id="webview" src="https://kord.gg"></iframe>
    <script>
        // Hide splash after page loads
        document.getElementById('webview').addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('splash').classList.add('hidden');
            }, 1500);
        });
        // Fallback: hide splash after 4 seconds regardless
        setTimeout(function() {
            document.getElementById('splash').classList.add('hidden');
        }, 4000);
    </script>
</body>
</html>
